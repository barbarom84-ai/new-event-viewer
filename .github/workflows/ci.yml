name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore EventViewer.sln

      - name: Build Core
        run: dotnet build EventViewer.Core/EventViewer.Core.csproj -c Release --no-restore

      - name: Build WPF legacy
        run: dotnet build EventViewer.csproj -c Release --no-restore

      - name: Build WPF (Store flag)
        run: dotnet build EventViewer.csproj -c Release -p:StoreBuild=true --no-restore

      - name: Build WinUI
        run: dotnet build EventViewer.WinUI/EventViewer.WinUI.csproj -c Release -p:Platform=x64 --no-restore

      - name: Build WinUI (Store flag)
        run: dotnet build EventViewer.WinUI/EventViewer.WinUI.csproj -c Release -p:Platform=x64 -p:StoreBuild=true --no-restore

      - name: Build WinUI USB publish smoke
        run: dotnet publish EventViewer.WinUI/EventViewer.WinUI.csproj -c Release -p:Platform=x64 -p:WindowsPackageType=None --self-contained false -r win-x64 -o bin/WinUI_USB_CI

      - name: Build WinUI Store-flagged publish smoke
        run: dotnet publish EventViewer.WinUI/EventViewer.WinUI.csproj -c Release -p:Platform=x64 -p:StoreBuild=true -p:WindowsPackageType=None --self-contained false -r win-x64 -o bin/WinUI_Store_CI

      - name: Test
        run: dotnet test EventViewer.Tests/EventViewer.Tests.csproj -c Release --verbosity normal
