name: Preview Build

on:
  workflow_dispatch:
    inputs:
      channel:
        description: "Release channel"
        required: true
        default: "preview"
        type: choice
        options:
          - preview
          - stable

jobs:
  publish:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore EventViewer.sln

      - name: Publish
        run: >
          dotnet publish EventViewer.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:StoreBuild=${{ github.event.inputs.channel == 'preview' && 'false' || 'true' }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: eventviewer-${{ github.event.inputs.channel }}
          path: bin/Release/net8.0-windows/win-x64/publish/**
