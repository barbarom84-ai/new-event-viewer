name: Preview Build

on:
  workflow_dispatch:
    inputs:
      channel:
        description: "Release channel"
        required: true
        default: "preview"
        type: choice
        options:
          - preview
          - stable

jobs:
  publish:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore EventViewer.sln

      - name: Test
        run: dotnet test EventViewer.Tests/EventViewer.Tests.csproj -c Release --verbosity minimal

      - name: Publish WinUI USB (preview) or Store-flagged (stable)
        shell: pwsh
        run: |
          if ("${{ github.event.inputs.channel }}" -eq "stable") {
            .\build_winui_store.ps1 -Output "bin/WinUI_Preview"
          } else {
            .\build_winui_usb.ps1 -Output "bin/WinUI_Preview"
          }

      - name: Optional Authenticode sign
        shell: pwsh
        env:
          EVENTVIEWER_SIGN_PFX_BASE64: ${{ secrets.EVENTVIEWER_SIGN_PFX_BASE64 }}
          EVENTVIEWER_SIGN_PFX_PASSWORD: ${{ secrets.EVENTVIEWER_SIGN_PFX_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:EVENTVIEWER_SIGN_PFX_BASE64)) {
            Write-Host "No EVENTVIEWER_SIGN_PFX_BASE64 secret — skipping Authenticode."
            exit 0
          }
          $pfx = Join-Path $env:RUNNER_TEMP "codesign.pfx"
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:EVENTVIEWER_SIGN_PFX_BASE64))
          $env:EVENTVIEWER_SIGN_PFX = $pfx
          .\tools\Sign-Authenticode.ps1 -Path "bin/WinUI_Preview/EventViewer.WinUI.exe"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: eventviewer-winui-${{ github.event.inputs.channel }}
          path: bin/WinUI_Preview/**
